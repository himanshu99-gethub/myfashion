<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>MyFashion | Your Bag</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="css/style.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary': '#192230',
                        'secondary': '#2c2f38',
                        'card-bg': '#3d474e',
                        'accent': '#ffcd00',
                        'text-white': '#f4f4f2',
                        'text-muted': '#9aa3ad'
                    },
                    fontFamily: {
                        'bebas': ['Bebas Neue', 'sans-serif'],
                        'syne': ['Syne', 'sans-serif'],
                        'dm': ['DM Sans', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .cart-item { border-bottom: 1px solid rgba(255,205,0,0.05); }
    </style>
</head>
<body class="bg-primary text-text-white font-dm">
    <!-- Header -->
        <!-- Header -->
    <header id="main-header" class="fixed top-0 w-full z-50 transition-all duration-300 py-4 px-8 flex justify-between items-center bg-primary/90 backdrop-blur-xl border-b border-accent/10">
        <div class="flex items-center gap-4">
            <a href="index.html" class="text-3xl font-bebas tracking-widest text-accent">MYFASHION</a>
        </div>
        
        <div class="hidden md:flex flex-1 max-w-xl mx-12">
            <div class="relative w-full">
                <input type="text" id="global-search" placeholder="Search curated fashion..." class="w-full bg-secondary border border-accent/20 text-sm py-3 px-10 rounded-full focus:ring-1 focus:ring-accent outline-none">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-text-muted text-lg">search</span>
            </div>
        </div>

        <div class="flex items-center gap-6">
            <a href="shop.html" class="text-xs uppercase tracking-widest hover:text-accent transition-colors hidden md:block">Shop</a>
            <a href="admin_login.html" class="text-xs uppercase tracking-widest hover:text-accent transition-colors text-accent font-bold">ADMIN</a>
            <a href="cart.html" class="relative hover:text-accent transition-colors">
                <span class="material-symbols-outlined">local_mall</span>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-accent text-black text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center">0</span>
            </a>
            <div id="user-menu" class="relative group">
                <a href="login.html" id="login-btn" class="btn-primary py-2 px-6 text-sm flex items-center gap-2"><span class="material-symbols-outlined text-sm">person</span>Login</a>
                <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-48 bg-secondary rounded-lg shadow-2xl py-2 border border-accent/10">
                    <a href="orders.html" class="block px-4 py-2 hover:bg-card-bg text-sm uppercase tracking-widest">My Orders</a>
                    <a href="admin.html" class="hidden admin-only block px-4 py-2 hover:bg-card-bg text-sm uppercase tracking-widest">Admin Panel</a>
                    <hr class="border-accent/10 my-1">
                    <button id="logout-btn" class="w-full text-left px-4 py-2 hover:bg-card-bg text-error text-sm uppercase tracking-widest">Logout</button>
                </div>
            </div>
        </div>
    </header>

    <main class="pt-32 pb-24 px-8 max-w-[1440px] mx-auto min-h-screen">
        <div class="mb-16" data-reveal>
            <span class="text-accent tracking-[0.4em] uppercase text-xs font-bold block mb-4">Elite Curation</span>
            <h1 class="text-7xl font-bebas tracking-widest leading-none">YOUR <span class="text-accent">BAG</span></h1>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-16 items-start">
            <!-- Product List Section -->
            <section class="lg:col-span-8 space-y-8" id="cart-items">
                <!-- Cart items will be loaded here -->
                <div class="animate-pulse space-y-8">
                    <div class="flex gap-8 items-center bg-secondary p-6 rounded-2xl">
                        <div class="w-32 h-40 bg-card-bg rounded-xl"></div>
                        <div class="flex-grow space-y-4">
                            <div class="h-6 w-1/2 bg-card-bg"></div>
                            <div class="h-4 w-1/4 bg-card-bg"></div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Order Summary Section -->
            <aside class="lg:col-span-4 sticky top-32" data-reveal>
                <div class="bg-secondary p-10 rounded-2xl border border-accent/5">
                    <h2 class="text-3xl font-bebas tracking-widest mb-10">SUMMARY</h2>
                    <div class="space-y-6 mb-10 text-sm">
                        <div class="flex justify-between text-text-muted">
                            <span class="uppercase tracking-widest">Subtotal</span>
                            <span class="font-bold text-white" id="cart-subtotal">₹0</span>
                        </div>
                        <div class="flex justify-between text-text-muted">
                            <span class="uppercase tracking-widest">Processing</span>
                            <span class="font-bold text-accent">COMPLIMENTARY</span>
                        </div>
                        <div class="pt-6 border-t border-accent/10 flex justify-between items-end">
                            <span class="text-xl font-bebas tracking-widest">TOTAL VALUATION</span>
                            <span class="text-3xl font-syne font-bold text-accent" id="cart-total">₹0</span>
                        </div>
                    </div>
                    <button id="checkout-btn" class="btn-primary w-full py-5 text-sm font-bold tracking-widest">
                        Proceed to Checkout
                    </button>
                    
                    <div class="mt-8 flex items-center justify-center gap-4 text-[10px] uppercase tracking-widest text-text-muted font-bold">
                        <span class="material-symbols-outlined text-xs">lock</span>
                        <span>Secured by Quantum-Noir Encryption</span>
                    </div>
                </div>
            </aside>
        </div>
    </main>

        
    
    

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/cart.js"></script>
<script src="js/script.js"></script>
</body>
</html>
