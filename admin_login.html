<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>MyFashion | Admin Access</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="css/style.css?v=1.1" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary': '#192230',
                        'secondary': '#2c2f38',
                        'card-bg': '#3d474e',
                        'accent': '#ffcd00',
                        'text-white': '#f4f4f2',
                        'text-muted': '#9aa3ad'
                    },
                    fontFamily: {
                        'bebas': ['Bebas Neue', 'sans-serif'],
                        'syne': ['Syne', 'sans-serif'],
                        'dm': ['DM Sans', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .auth-card { background: rgba(25, 34, 48, 0.95); -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px); border: 1px solid rgba(255, 205, 0, 0.15); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        
        input {
            background: #1c2633 !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            padding-top: 14px !important;
            padding-bottom: 14px !important;
            border-radius: 12px !important;
            transition: all 0.3s ease !important;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3) !important;
        }
        input:focus {
            background: rgba(255, 255, 255, 0.07) !important;
            border-color: var(--yellow) !important;
            box-shadow: 0 0 20px rgba(255, 205, 0, 0.1), inset 0 2px 4px rgba(0,0,0,0.2) !important;
            transform: translateY(-1px);
        }
        input::placeholder { color: rgba(255, 255, 255, 0.4) !important; }

        /* Autofill Fix */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px #1c2633 inset !important;
            -webkit-text-fill-color: #ffffff !important;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
</head>
<body class="bg-primary text-text-white font-dm min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    <!-- Admin Background Elements -->
    <div class="absolute top-0 right-0 w-96 h-96 bg-accent/5 rounded-full blur-[100px]"></div>
    <div class="absolute bottom-0 left-0 w-96 h-96 bg-accent/5 rounded-full blur-[100px]"></div>

    <div class="max-w-md w-full auth-card rounded-2xl shadow-2xl overflow-hidden relative z-10" data-reveal>
        <div class="p-10">
            <div class="text-center mb-10 relative">
                <span class="material-symbols-outlined text-accent text-5xl mb-4 opacity-80">admin_panel_settings</span>
                <h1 class="text-3xl font-bebas tracking-widest text-accent mb-2">ADMIN PORTAL</h1>
                <p id="auth-subtitle" class="text-xs text-text-muted uppercase tracking-widest italic">Authorized Personnel Only</p>
            </div>

            <form id="admin-auth-form" class="space-y-6">
                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-text-muted mb-2 ml-1">Admin Email</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-text-muted text-lg">mail</span>
                        <input id="email" type="email" placeholder="admin@myfashion.com" required class="w-full !pl-12">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-text-muted mb-2 ml-1">Admin Password</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-text-muted text-lg">lock</span>
                        <input id="password" type="password" placeholder="••••••••" required class="w-full !pl-12">
                    </div>
                </div>

                <div class="flex justify-between items-center text-[10px] uppercase tracking-widest font-bold">
                    <label class="flex items-center gap-2 cursor-pointer text-text-muted hover:text-text-white transition-colors">
                        <input type="checkbox" class="accent-accent"> Remember Me
                    </label>
                </div>

                <button type="submit" id="submit-btn" class="btn-primary w-full py-4 text-sm font-bold flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-lg">login</span> Secure Login
                </button>
            </form>
            
            <div class="mt-8 text-center">
                <a href="index.html" class="text-[10px] uppercase tracking-widest text-text-muted hover:text-accent transition-colors flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-sm">arrow_back</span> Return to Storefront
                </a>
            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/ui.js"></script>

<script>
    // Handle Admin Login Specifically
    document.addEventListener('DOMContentLoaded', () => {
        const adminForm = document.getElementById('admin-auth-form');
        const submitBtn = document.getElementById('submit-btn');

        if (adminForm) {
            adminForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                // Visual feedback
                const originalText = submitBtn.innerHTML;
                submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> Authenticating...';
                submitBtn.disabled = true;

                try {
                    // Quick check if it's the admin email before doing the full auth call
                    if(email !== 'admin@myfashion.com' && email !== 'admin@fashion.com') {
                        throw new Error('Unauthorized Access. Invalid Admin Credentials.');
                    }

                    let { data, error } = await window.db.auth.signInWithPassword({
                        email: email,
                        password: password,
                    });

                    if (error) {
                        // Check if the error is exactly about invalid credentials (wrong password or doesn't exist)
                        if (error.message.includes('Invalid login credentials')) {
                            // Try to sign up
                            const { data: signUpData, error: signUpError } = await window.db.auth.signUp({
                                email: email,
                                password: password,
                                options: { data: { full_name: 'Administrator' } }
                            });
                            
                            if (!signUpError && signUpData.user) {
                                await window.db.from('users').upsert({
                                    id: signUpData.user.id,
                                    email: email,
                                    name: 'Administrator',
                                    role: 'admin'
                                });
                                
                                if (!signUpData.session) {
                                    throw new Error('Account created! Please check your email to verify.');
                                }
                            } else if (signUpError && signUpError.message.includes('already registered')) {
                                throw new Error('Incorrect password. If you forgot it, reset it in Supabase.');
                            } else if (signUpError) {
                                throw new Error('Sign up failed: ' + signUpError.message);
                            }
                        } else {
                            // Throw the exact error (e.g. Email not confirmed)
                            throw error;
                        }
                    }
                    
                    showToast('Admin Authenticated Successfully', 'success');
                    
                    setTimeout(() => {
                        window.location.replace('admin_products.html');
                    }, 1000);

                } catch (error) {
                    console.error('Login error:', error.message);
                    showToast(error.message || 'Invalid credentials', 'error');
                    
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            });
        }
    });
</script>
</body>
</html>
